spring.application.name=worksync

spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:worksync}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Clave secreta para JWT (debe tener al menos 256 bits para HS256)
jwt.secret=worksync-secret-key-de-256-bits-para-firmar-tokens-jwt-segura

# Orígenes permitidos para CORS (separados por comas en variables de entorno)
allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000}